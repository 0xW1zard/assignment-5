<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- deisy ui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>


    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body class="bg-[#F8FAFC]">
    <section class="max-w-lg mx-auto text-center space-y-9 md:shadow-lg mt-10 p-4 bg-white shadow-2xl">
        <div class="">
            <img class="mx-auto mb-6" src="assets/github-logo.png" alt="">
            <h3 class="text-[24px] font-semibold ">GitHub Issues Tracker</h3>
            <p class="text-[#64748B]">Sign in to manage your issues</p>
        </div>
        <div class="">
            <fieldset class="fieldset p-4 mx-auto">

                <label class="label text-[16px] font-medium text-[#1F2937]">Username</label>
                <input id="input-username" type="text" class="input w-full" placeholder="Enter Username" />
                <small class="text-[14px] text-[#4A00FF] flex justify-start mb-6">Default: admin</small>

                <label class="label text-[16px] font-medium text-[#1F2937]">Password</label>
                <input  id="input-password" type="password" class="input w-full" placeholder="Password" />
                <small class="text-[14px] text-[#4A00FF] flex justify-start mb-3">Default: admin123</small>

                <button id="btn-singIn" onclick="singIn()" class="btn btn-primary mt-4 p-6 rounded-lg">Sing In</button>
            </fieldset>
        </div>
        <div>
            <div class="divider text-neutral-500">OR</div>
            <small class="text-[#64748B]">Demo Credentials:</small>
            <p class="py-5 border border-gray-400 w-fit mx-auto py-4 px-6 rounded-xl bg-slate-50 mt-3">
                <span class="font-semibold">Username:</span> admin <br>
                <span class="font-semibold">Password:</span> admin123
            </p>
        </div>

    </section>

    <script src="script/login.js"></script>
</body>

</html>

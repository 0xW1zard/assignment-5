<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>

    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- deisy ui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body class="bg-[#F8FAFC]">
    <header>
        <div class="navbar bg-base-100 shadow-sm flex justify-between">
            <div class="flex items-center justify-center gap-3 ml-6">
                <img class="w-10" src="assets/github-logo.png" alt="">
                <a class="font-semibold text-xl">GitHub Issues Tracker</a>
            </div>
            <div class="flex gap-2 mr-5">
                <label class="input input-bordered flex items-center gap-2 w-full max-w-md">
                    <i class="fa-solid fa-magnifying-glass text-gray-400"></i>
                    <input type="text" class="grow" placeholder="Search issues..." />
                </label>
                <button class="btn btn-primary flex justify-center"> <span><i class="fa-solid fa-plus"></i></span> New
                    Issue</button>
            </div>
        </div>
    </header>

    <section class="w-10/12 mx-auto mt-16 ">

        <div class="bg-white shadow-md p-6 flex gap-3 rounded-md">
            <button class="btn btn-outline btn-primary py-5 px-8 font-semibold text-[16px]">All</button>
            <button class="btn btn-outline btn-primary py-5 px-8 font-semibold text-[16px]">Open</button>
            <button class="btn btn-outline btn-primary py-5 px-8 font-semibold text-[16px]">Closed</button>
        </div>
    </section>

    <section class="w-10/12 mx-auto mt-10 shadow-md">
        <div class="bg-white p-6 flex justify-between items-center">
            <div class="flex justify-center items-center gap-3">
                <img class="p-2 rounded-full bg-[#ECE4FF]" src="assets/Aperture.png" alt="">
                <div>
                    <h3 class="font-semibold text-[20px]">50 Issues</h3>
                    <p class="text-[#64748B]">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex gap-3">
                <div class="flex items-center gap-2">
                    <div class="p-1.5 bg-green-500 rounded-full"></div>
                    <p>Open</p>
                </div>
                <div class="flex items-center gap-2">
                    <div class="p-1.5 bg-blue-400 rounded-full"></div>
                    <p>Closed</p>
                </div>
            </div>
        </div>
        <hr class="border-gray-300 mb-4">

        <!-- cards -->

        <div class="grid grid-cols-4 p-4">

            <div class="max-w-md bg-white border border-gray-100 rounded-lg shadow-sm overflow-hidden">

                <div class="h-1 bg-[#15C858]"></div>

                <div class="p-5">

                    <div class="flex items-center justify-between mb-4">
                        <div><img class="w-8 h-8" src="assets/Open-Status.png" alt=""></div>
                        <span class="bg-[#FEEBF0] text-[#D83643] text-sm font-semibold px-4 py-1.5 rounded-full">HIGH</span>
                    </div>

                    <h3 class="text-xl font-semibold text-[#1F2937] leading-tight mb-2 mt-8">Fix Navigation Menu On Mobile
                        Devices</h3>

                    <p class="text-base text-[#6B7280] leading-relaxed mb-5">The navigation menu doesn't collapse
                        properly on mobile devices...</p>

                    <div class="flex items-center gap-3 mb-5">
                        <div
                            class="flex items-center gap-1.5 bg-[#FFFBEB] border border-[#FEF3C7] text-[#9A6A23] px-3.5 py-1 rounded-full">
                            <i class="fa-solid fa-life-ring text-xs"></i>
                            <span class="font-medium tracking-wide text-xs">Help Wanted</span>
                        </div>
                    </div>

                    <hr class="border-gray-100 -mx-5 mb-4">

                    <div class="flex justify-between space-y-1.5">
                        <div>
                            <p class="text-sm text-[#6B7280]">
                                #1 by <span class="font-medium">john_doe</span>
                            </p>
                            <p class="text-sm text-[#6B7280]">
                                Assignee: <span class="font-medium">john_doe</span>
                            </p>
                        </div>
                        <div>
                            <p class="text-sm text-[#6B7280]">
                               Created At: <span>1/15/2024</span>
                            </p>
                            <p class="text-sm text-[#6B7280]">
                               Updated At: <span>1/15/2024</span>
                            </p>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </section>
</body>

</html>
